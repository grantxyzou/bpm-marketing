// ── Wireframe primitives ──────────────────────────────────────────────────────
const Sketch = ({ children, size=12, color=C.muted, style={} }) => (
  <div style={{ fontFamily:C.sketch, fontSize:size, color, lineHeight:1.4, ...style }}>{children}</div>

const Tag = ({ children }) => (
